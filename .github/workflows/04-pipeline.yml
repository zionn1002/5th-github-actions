name: CI Pipeline
on:
  workflow_dispatch:
#  push:
#    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: 린트 
        run: echo "린트 통과"

  unit-test:
    runs-on: ubuntu-latest
    needs: lint
    outputs:
      passed_count: ${{ steps.count.outputs.value }}
    steps:
      - id: count
        run: echo "value=5" >> $GITHUB_OUTPUT
      - run: |
          echo "테스트 통과: 5/5"
  
  build:
    runs-on: ubuntu-latest
    needs: lint
    outputs:
      artifact_name: ${{ steps.set-name.outputs.value }}
    steps:
      - id: set-name
        run: echo "echo "value=myapp-${{ github.run_number }}.jar" >> $GITHUB_OUTPUT"
      - run: echo "빌드 완료"

  deploy:
    runs-on: ubuntu-latest
    needs: [unit-test, build]
    if: ${{ github.ref_name == 'main' }}
    steps:
      - run: |
          echo "테스트 통과 수: ${{ needs.unit-test.outputs.passed_count }}"
          echo "배포 아티팩트: ${{ needs.build.outputs.artifact_name }}"
          echo "배포 환경: production"

  notify:
    runs-on: ubuntu-latest
    needs: [lint, unit-test, build, deploy]
    if: ${{ always() }}
    steps:
      - run: |
          echo "=== 파이프라인 결과 ==="
          echo "lint: ${{ needs.lint.result }}"
          echo "unit-test: ${{ needs.unit-test.result }}"
          echo "build: ${{ needs.build.result }}"
          echo "deploy: ${{ needs.deploy.result }}"      
        
