name: Build Info Simulation
on:
  workflow_dispatch

env:
  APP_NAME: MyApp
  BUILD_ENV: production
  VERSION: 1.0.0

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      BUILD_ENV: staging
    steps:
      - name: 워크플로우 레벨 변수 확인
        run: |
          echo "App: $APP_NAME"
          echo "Version: $VERSION"
          echo "Environment: $BUILD_ENV"

      - name: Step 레벨로 BUILD_ENV 덮어쓰기
        env:
          BUILD_ENV: development
        run: |          
          echo "App: $APP_NAME"
          echo "Version: $VERSION"
          echo "Environment: $BUILD_ENV"

      - name: 최종 빌드 정보
        run: |
          echo "=== 빌드 완료 ==="
          echo "App: $APP_NAME"
          echo "Version: $VERSION"
          echo "Environment: $BUILD_ENV"
          echo "=== 끝 ==="
    
